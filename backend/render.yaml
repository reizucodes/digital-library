# =============================================================================
# Render service definition — DOCUMENTATION ONLY
#
# This file is NOT auto-applied by Render after initial service creation.
# Any changes here must be manually applied in the Render dashboard under:
#   Settings > Build & Deploy
#
# To use this as true IaC, delete the service and redeploy via Blueprints:
#   https://render.com/docs/infrastructure-as-code
# =============================================================================

services:
  - type: web
    name: digital-library-api
    runtime: python

    # Installs uv, then syncs production deps from uv.lock into .venv/
    buildCommand: pip install uv && uv sync --no-dev

    # Runs migrations, seeds on first deploy, then starts the server
    # Set this manually in Render dashboard: bash scripts/start.sh
    startCommand: bash scripts/start.sh

    # Render polls this path to determine if the service is healthy
    healthCheckPath: /health

    envVars:
      # Neon PostgreSQL connection string — set manually in Render dashboard
      # Format: postgresql://user:pass@ep-xxx.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        sync: false

      # Production frontend URL — set manually in Render dashboard
      # Format: ["https://your-app.vercel.app"]
      - key: CORS_ORIGINS
        sync: false

      # Auto-generated by Render — no action needed
      - key: SECRET_KEY
        generateValue: true
